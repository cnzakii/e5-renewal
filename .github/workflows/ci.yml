name: CI

on:
  pull_request:
    branches: [main]
  workflow_call: # Allow reuse from release.yml

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  # Coverage thresholds (%)
  BACKEND_COVERAGE_THRESHOLD: 80
  FRONTEND_COVERAGE_THRESHOLD: 80

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: backend

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run tests with coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "Backend coverage: ${COVERAGE}%"
          if [ "$(echo "${COVERAGE} < ${BACKEND_COVERAGE_THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Backend coverage ${COVERAGE}% is below threshold ${BACKEND_COVERAGE_THRESHOLD}%"
            exit 1
          fi
          echo "Backend coverage ${COVERAGE}% meets threshold ${BACKEND_COVERAGE_THRESHOLD}%"

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/ --max-warnings 20

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage --coverage.provider=v8 --coverage.reporter=text --coverage.reporter=json-summary

      - name: Check coverage threshold
        run: |
          COVERAGE=$(node -e "
            const summary = require('./coverage/coverage-summary.json');
            const total = summary.total;
            const avg = (total.lines.pct + total.branches.pct + total.functions.pct + total.statements.pct) / 4;
            console.log(avg.toFixed(2));
          ")
          echo "Frontend coverage: ${COVERAGE}%"
          if [ "$(echo "${COVERAGE} < ${FRONTEND_COVERAGE_THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Frontend coverage ${COVERAGE}% is below threshold ${FRONTEND_COVERAGE_THRESHOLD}%"
            exit 1
          fi
          echo "Frontend coverage ${COVERAGE}% meets threshold ${FRONTEND_COVERAGE_THRESHOLD}%"

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, frontend-test]
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t e5-renewal:ci .
