version: "2"
linters:
  enable:
    - bodyclose
    - contextcheck
    - durationcheck
    - errorlint
    - fatcontext
    - forcetypeassert
    - gocritic
    - gosec
    - misspell
    - nilerr
    - noctx
    - prealloc
    - revive
    - sqlclosecheck
    - unconvert
    - unparam
    - wastedassign
  settings:
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
    gocritic:
      disabled-checks:
        - hugeParam
      enabled-tags:
        - diagnostic
        - performance
    gosec:
      excludes:
        - G101  # false positive: URL templates contain "token" keyword
        - G117  # false positive: ClientSecret field name matches secret pattern
        - G404  # math/rand weak random (non-security context)
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - contextcheck
          - errcheck
          - forcetypeassert
          - gosec
          - noctx
          - unparam
        path: _test\.go
      - linters:
          - contextcheck
        path: services/scheduler/scheduler\.go
    paths:
      - vendor
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - vendor
      - third_party$
      - builtin$
      - examples$
