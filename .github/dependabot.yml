version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(go):"

  # npm
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(npm):"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(ci):"

  # Docker
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(docker):"
